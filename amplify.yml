version: 1
backend:
  phases:
    build:
      commands:
        - npm ci --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        # Run from repo root — reads amplify_outputs.json generated by the
        # backend phase above and writes frontend/.env.local with the Cognito
        # IDs + API URL the Vite build will inline.
        - npm run sync-config
        - cd frontend && npm ci --cache .npm --prefer-offline
    build:
      commands:
        - cd frontend && npm run build
  artifacts:
    baseDirectory: frontend/dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - frontend/node_modules/**/*
      - .npm/**/*
